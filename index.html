<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      href="resources/favicon.ico"
      type="image/x-icon"
      sizes="96x96"
    />

    <title>Join Our Newsletter | devChallenges.io</title>

    
    <style>
      @font-face{
        font-family: "poppin";
        src : url("./fontes/h1/Poppins/Poppins-SemiBold.ttf");
        font-weight: 100 900;
        font-display: swap;
      }

      @font-face{
        font-family: "poppin2";
        src : url("./fontes/h1/Poppins/Poppins-Regular.ttf");
        font-weight: 100 900;
        font-display: swap;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        height: 100vh;
      }

      .author-info {
        font-size: 14px;
        text-align: center;
        margin-top: 16px;
        color: rgb(55, 65, 81);
      }

      .author-info a {
        text-decoration: none;
      }

      #logo{
        display: block;
        margin: 0 auto;
      }
      h1{
        font-family: "poppin";
        font-weight: 600;
        font-size: 3rem;
      }
      p{
        max-width: 400px;
        color: #6C727F;
        font-family: "poppin2";
        font-weight: 400;
        font-size: 1.25rem;
      }
      #title{
        display: flex;
        flex-direction: column;
        text-align: center;
        align-items: center;



      }
      #title > div{
        margin-top: 10px;

      }

    </style>
  </head>
  <body>
    

    <div class="author-info">
      Coded by <a href="#">Nastaran Rezaei</a> | Challenge by
      <a href="https://www.devchallenges.io?ref=challenge" target="_blank"
        >devChallenges.io</a
      >.
    </div>

    

    <section>
      <article id="title">
        <div>
          <img src="./resources/logo.svg" id="logo">
        </div>
        <div>
          <h1>Join our newsletter</h1>
        </div>
        <div>
          <p>Keep up with our latest collections, exclusive deals, and special offers! We introduce a new collection every week, so stay tuned to snag the hottest items just for you.</p>
        </div>
      </article>
    </section>


  </body>
</html>
